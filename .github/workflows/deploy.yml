name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build:production
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy-aliyun:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Debug secrets
        run: |
          if [ -z "${{ secrets.ALIYUN_SERVER_HOST }}" ]; then
            echo "ERROR: ALIYUN_SERVER_HOST is empty"
            exit 1
          fi
          echo "Host set: ${{ secrets.ALIYUN_SERVER_HOST }}"

      - name: Deploy to Alibaba Cloud
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.ALIYUN_SSH_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H '${{ secrets.ALIYUN_SERVER_HOST }}' >> ~/.ssh/known_hosts

          # 1. Deploy frontend
          tar czf - --no-xattrs -C dist . | ssh '${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }}' "tar xzf - -C /var/www/vincentbuilds"

          # 2. Copy backend
          rsync -avz --exclude 'node_modules' --exclude '.venv' --exclude '__pycache__' --exclude '.git' \
            chefmate/ main.py config.py pyproject.toml uv.lock Dockerfile docker-compose.yml \
            data/ vector_index/ \
            '${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }}:/var/www/vincentbuilds-api/'

          # 3. Restart backend
          ssh '${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }}' "cd /var/www/vincentbuilds-api && docker compose up -d --build"

          # 4. Reload nginx
          ssh '${{ secrets.ALIYUN_SERVER_USER }}@${{ secrets.ALIYUN_SERVER_HOST }}' "sudo systemctl reload nginx"
